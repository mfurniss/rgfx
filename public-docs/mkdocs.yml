# RGFX Documentation
# https://squidfunk.github.io/mkdocs-material/

site_name: RGFX Documentation
site_url: https://rgfx.io/
site_description: Retro Game Effects - External visual effects for retro video games

theme:
  name: material
  custom_dir: overrides
  favicon: favicon.ico
  logo: assets/images/favicon.png
  palette:
    scheme: slate
    primary: grey
    accent: light blue
  features:
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - offline
  - open-in-new-tab
  - glightbox:
      auto_caption: true
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: false

# Disable features incompatible with file:// protocol
use_directory_urls: false

nav:
  - Overview:
    - Introduction: overview/index.md
    - Getting Started: overview/getting-started.md
    - Requirements: overview/requirements.md
    - Architecture: overview/architecture.md
  - Interceptors:
    - Introduction: interceptors/index.md
    - Event System: interceptors/events.md
    - RAM Monitoring: interceptors/ram.md
    - Ambilight: interceptors/ambilight.md
    - Spectrum Analyzer: interceptors/fft.md
    - Writing Interceptors: interceptors/writing-interceptors.md
    - MAME API: interceptors/mame-api.md
  - Transformers:
    - Introduction: transformers/index.md
    - Global Configuration: transformers/global.md
    - Utilities: transformers/utils.md
    - GIF Bitmaps: transformers/gif-bitmaps.md
    - Ambilight: transformers/ambilight.md
  - Drivers:
    - Introduction: drivers/index.md
    - Setup: drivers/firmware-and-wifi.md
    - Configure LED Hardware: drivers/configure-leds.md
    - Visual Effects: drivers/effects.md
    - ESP32 Firmware: drivers/esp32/index.md
    - LED Hardware: drivers/led-hardware/index.md
    - Examples: drivers/examples.md
  - Hub App:
    - Introduction: hub-app/index.md
    - System Status: hub-app/system-status.md
    - Drivers:
      - Overview: hub-app/drivers.md
      - Driver Detail: hub-app/driver-detail.md
      - Test LEDs: hub-app/test-leds.md
    - Firmware: hub-app/firmware.md
    - Games: hub-app/games.md
    - Event Monitor: hub-app/event-monitor.md
    - FX Playground: hub-app/fx-playground.md
    - Simulator: hub-app/simulator.md
    - Settings: hub-app/settings.md

markdown_extensions:
  - attr_list
  - mdx_truly_sane_lists
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/mermaid.min.js
