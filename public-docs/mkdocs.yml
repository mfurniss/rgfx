# RGFX Documentation
# https://squidfunk.github.io/mkdocs-material/

site_name: RGFX Documentation
site_url: https://rgfx.io/
site_description: Retro Game Effects - External visual effects for retro video games
strict: true

theme:
  name: material
  custom_dir: overrides
  favicon: favicon.ico
  logo: assets/images/favicon.png
  palette:
    scheme: slate
    primary: grey
    accent: light blue
  features:
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - offline
  - open-in-new-tab
  - glightbox:
      auto_caption: true
  - git-revision-date-localized:
      enable_creation_date: false
      fallback_to_build_date: false

# Disable features incompatible with file:// protocol
use_directory_urls: false

nav:
  - Home: index.md
  - Getting Started:
    - What You'll Need: getting-started/requirements.md
    - Set Up RGFX Hub: getting-started/hub-setup.md
    - Flash Your First Driver: getting-started/first-driver.md
    - Play a Game: getting-started/play.md
  - Example Games: games.md
  - Hub App:
    - Overview: hub-app/index.md
    - System Status: hub-app/system-status.md
    - Drivers: hub-app/drivers.md
    - Driver Detail: hub-app/driver-detail.md
    - Firmware: hub-app/firmware.md
    - Games: hub-app/games.md
    - Event Monitor: hub-app/event-monitor.md
    - FX Playground: hub-app/fx-playground.md
    - Simulator: hub-app/simulator.md
    - Settings: hub-app/settings.md
  - LED Hardware:
    - Choosing Hardware: hardware/choosing.md
    - Wiring & Power: hardware/wiring.md
    - Configuration: hardware/configure.md
    - Test LEDs: hub-app/test-leds.md
    - Visual Effects: hardware/effects.md
    - Build Examples: hardware/examples.md
  - Interceptors:
    - Introduction: interceptors/index.md
    - Event System: interceptors/events.md
    - RAM Monitoring: interceptors/ram.md
    - Ambilight: interceptors/ambilight.md
    - Spectrum Analyzer: interceptors/fft.md
    - Writing Interceptors: interceptors/writing-interceptors.md
    - MAME API: interceptors/mame-api.md
  - Transformers:
    - Introduction: transformers/index.md
    - Global Configuration: transformers/global.md
    - Utilities: transformers/utils.md
    - GIF Bitmaps: transformers/gif-bitmaps.md
    - Ambilight: transformers/ambilight.md
  - FAQ / Troubleshooting: faq.md
  - About: about.md

markdown_extensions:
  - attr_list
  - mdx_truly_sane_lists
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/mermaid.min.js
