name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v0.7.0)"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.push.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Validate version
        id: tag
        run: |
          TAG="${{ inputs.version }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must match vMAJOR.MINOR.PATCH (e.g., v0.7.0)"
            exit 1
          fi
          if git rev-parse "refs/tags/$TAG" &>/dev/null; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run quality checks
        working-directory: rgfx-hub
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Bump version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('rgfx-hub/package.json', 'utf-8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('rgfx-hub/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit and tag
        id: push
        run: |
          TAG="${{ inputs.version }}"
          VERSION="${TAG#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rgfx-hub/package.json package-lock.json
          git commit -m "Bump hub version to ${VERSION}"
          git tag "$TAG"
          git push origin main
          git push origin "$TAG"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-driver:
    name: Build Driver Firmware
    needs: [prepare]
    if: ${{ !cancelled() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            esp32/.pio
          key: pio-${{ hashFiles('esp32/platformio.ini') }}
          restore-keys: pio-

      - name: Inject version
        run: node scripts/inject-version-driver.js

      - name: Generate HTML headers
        run: python3 esp32/html_to_progmem.py

      - name: Build firmware
        run: pio run --project-dir esp32

      - name: Copy firmware to Hub assets
        run: python3 esp32/copy_firmware.py

      - name: Upload firmware assets for Hub builds
        uses: actions/upload-artifact@v4
        with:
          name: hub-firmware-assets
          path: rgfx-hub/assets/esp32/firmware/

  build-hub-macos:
    name: Build Hub (macOS)
    needs: [prepare, build-driver]
    if: ${{ !cancelled() && needs.prepare.result == 'success' && needs.build-driver.result == 'success' }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Download firmware assets
        uses: actions/download-artifact@v4
        with:
          name: hub-firmware-assets
          path: rgfx-hub/assets/esp32/firmware/

      - name: Inject Hub version
        run: node scripts/inject-version-hub.js

      - name: Build installer
        run: npm run make
        working-directory: rgfx-hub
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Rename installer
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${TAG#v}"
          ARCH=$(uname -m)
          DMG=$(find rgfx-hub/out/make -name "*.dmg" | head -1)
          DEST="rgfx-${VERSION}-macos-${ARCH}.dmg"
          cp "$DMG" "$DEST"
          echo "ARTIFACT_NAME=$DEST" >> "$GITHUB_ENV"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: hub-installer-macos
          path: ${{ env.ARTIFACT_NAME }}

  build-hub-windows:
    name: Build Hub (Windows)
    needs: [prepare, build-driver]
    if: ${{ !cancelled() && needs.prepare.result == 'success' && needs.build-driver.result == 'success' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Download firmware assets
        uses: actions/download-artifact@v4
        with:
          name: hub-firmware-assets
          path: rgfx-hub/assets/esp32/firmware/

      - name: Inject Hub version
        run: node scripts/inject-version-hub.js

      - name: Build installer
        run: npm run make
        working-directory: rgfx-hub

      - name: Rename installer
        shell: pwsh
        run: |
          $tag = "${{ needs.prepare.outputs.tag }}"
          $version = $tag.TrimStart("v")
          $exe = Get-ChildItem -Path "rgfx-hub/out/make" -Filter "*.exe" -Recurse | Select-Object -First 1
          $dest = "rgfx-${version}-windows-x64.exe"
          Copy-Item $exe.FullName $dest
          "ARTIFACT_NAME=$dest" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: hub-installer-windows
          path: ${{ env.ARTIFACT_NAME }}

  deploy-pages:
    name: Deploy Pages
    needs: [prepare]
    if: ${{ !cancelled() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Assemble site
        run: |
          mkdir -p _site/docs _site/assets
          cp rgfx.io/index.html _site/
          cp rgfx.io/favicon.ico _site/
          cp -r rgfx.io/assets/* _site/assets/
          cp -r public-docs/site/* _site/docs/
          echo "rgfx.io" > _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  create-release:
    name: Create Release
    needs: [prepare, build-hub-macos, build-hub-windows]
    if: ${{ !cancelled() && needs.prepare.result == 'success' && needs.build-hub-macos.result == 'success' && needs.build-hub-windows.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: hub-installer-macos
          path: artifacts/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: hub-installer-windows
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "RGFX ${{ needs.prepare.outputs.tag }}"
          generate_release_notes: true
          files: artifacts/*
