# Listen on port 1883, all interfaces
listener 1883
allow_anonymous true
persistence false

# # Low latency settings - minimize queuing
# max_inflight_messages 1
# max_queued_messages 1
# max_packet_size 1024

# # Disable persistence for speed (no disk writes)
# persistence false

# # Reduce keepalive
# max_keepalive 10

# # Don't save state to disk
# autosave_interval 0

# # QoS 0 defaults (fire and forget)
# upgrade_outgoing_qos false
# max_qos 0

# # Log settings (optional - can disable for even less overhead)
# # log_dest stdout
# # log_type error
# # log_type warning