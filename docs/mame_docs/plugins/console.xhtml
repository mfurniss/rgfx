<p>The console plugin provides functionality for MAME’s interactive Lua console.

<a class="reference internal" href="../commandline/commandline-all.xhtml#mame-commandline-console"><span class="std std-ref">console option</span></a> to activate the interactive Lua
console.  See <a class="reference internal" href="../luascript/index.xhtml#luascript"><span class="std std-ref">Lua Scripting Interface</span></a> for more information about MAME’s Lua API.</p>
