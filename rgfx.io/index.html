<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RGFX - Retro Game Effects</title>
    <link rel="icon" href="favicon.ico" />
    <meta name="description" content="Visual effects for retro video games" />
    <style>
      body {
        margin: 0;
        background: #121212;
      }

      #hero-video {
        position: fixed;
        inset: 0;
        object-fit: cover;
        filter: brightness(0.5);
      }

      .vignette {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          circle,
          transparent 30%,
          rgba(0, 0, 0, 0.8) 100%
        );
        pointer-events: none;
        z-index: 0;
      }

      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
      }

      .logo-wrap {
        position: relative;
        margin: 0 12px;
      }

      #logo {
        --r: #f44336;
        --g: #66bb6a;
        --f: #42a5f5;
        --x: #ab47bc;
        --cell: min(30px, calc((100vw - 51px) / 10));
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(10, var(--cell));
        grid-template-rows: repeat(10, var(--cell));
        gap: 3px;
      }

      #logo .r {
        background-color: var(--r);
      }
      #logo .g {
        background-color: var(--g);
      }
      #logo .f {
        background-color: var(--f);
      }
      #logo .x {
        background-color: var(--x);
      }

      .glow {
        position: absolute;
        filter: blur(10px) brightness(1.5);
        scale: 1.7;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <video id="hero-video" autoplay muted loop playsinline preload="auto">
      <source src="assets/video/hero.webm" type="video/webm" />
      <source src="assets/video/hero.mp4" type="video/mp4" />
    </video>
    <div class="vignette"></div>

    <div id="splash">
      <div class="logo-wrap">
        <div id="logo" role="img" aria-label="RGFX logo"></div>
      </div>
    </div>

    <script>
      const rgfxLogo = [
        'rrrrrggggg',
        'rr rrgg   ',
        'rrrr gg gg',
        'rr rrgg gg',
        'rr rrggggg',
        'fffffxx xx',
        'ff   xx xx',
        'ffff  xxx ',
        'ff   xx xx',
        'ff   xx xx',
      ];

      const logo = document.getElementById('logo');
      const frag = document.createDocumentFragment();

      for (const c of rgfxLogo.join('')) {
        const d = document.createElement('div');
        if (c !== ' ') d.className = c;
        frag.appendChild(d);
      }

      logo.appendChild(frag);
      const logoStyle = getComputedStyle(logo);

      const colors = Object.fromEntries(
        ['r', 'g', 'f', 'x'].map((k) => [
          k,
          logoStyle.getPropertyValue(`--${k}`).trim(),
        ])
      );
      const flash = { duration: 1200, easing: 'ease-in-out' };
      const fade = { duration: 1200, easing: 'ease-in-out', fill: 'forwards' };
      const wrap = logo.parentNode;

      function triggerBlock(el) {
        const cls = el.className;

        if (!colors[cls]) {
          return;
        }

        const current = getComputedStyle(el).backgroundColor;
        el.getAnimations().forEach((a) => a.cancel());
        el.animate(
          [
            { backgroundColor: current, offset: 0 },
            { backgroundColor: '#fff', offset: 0.0375 },
            { backgroundColor: '#fff', offset: 0.15 },
            { backgroundColor: colors[cls], offset: 1 },
          ],
          flash
        );

        const rect = el.getBoundingClientRect();
        const wrapRect = wrap.getBoundingClientRect();
        const glow = document.createElement('div');
        glow.className = 'glow';

        Object.assign(glow.style, {
          left: `${rect.left - wrapRect.left}px`,
          top: `${rect.top - wrapRect.top}px`,
          width: `${rect.width}px`,
          height: `${rect.height}px`,
          backgroundColor: colors[cls],
        });

        wrap.appendChild(glow);

        glow.animate(
          [
            { opacity: 0, offset: 0 },
            { opacity: 1, offset: 0.0375 },
            { opacity: 0, offset: 1 },
          ],
          fade
        ).onfinish = () => glow.remove();
      }

      logo.addEventListener('mouseover', (e) => triggerBlock(e.target));

      let lastTouchBlock = null;

      function handleTouch(e) {
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);

        if (!el || el === lastTouchBlock) {
          return;
        }

        lastTouchBlock = el;
        triggerBlock(el);
      }

      logo.addEventListener(
        'touchstart',
        (e) => {
          lastTouchBlock = null;
          handleTouch(e);
        },
        { passive: true }
      );

      logo.addEventListener('touchmove', handleTouch, { passive: true });
    </script>
  </body>
</html>
