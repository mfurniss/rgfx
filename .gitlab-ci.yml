# GitLab CI/CD for RGFX Project
# Multi-stage pipeline: test → build → deploy → release
#
# Workflow:
# 1. Feature branch: Push changes → No CI (use local pre-commit hooks)
# 2. Merge request: CI runs tests → Must pass to merge
# 3. Merge to main: CI runs tests + builds artifacts
# 4. Create tag: git tag v1.0.0 && git push origin v1.0.0
# 5. CI runs full pipeline → Deploys to Pages → Manual approval for release
#
# Stage breakdown:
# - test: Runs on MRs and main branch (no artifacts)
# - build: Runs on main + tags (creates artifacts for releases)
# - deploy: Runs on tags only (deploys to GitLab Pages)
# - release: Runs on tags only (creates GitHub-style release with manual approval)

variables:
  NODE_VERSION: "20"
  GIT_DEPTH: 0  # Full git history for version extraction
  npm_config_cache: "$CI_PROJECT_DIR/rgfx-hub/.npm"  # Use project-local npm cache

# Run on merge requests, main branch, and version tags only
# Auto-cancel redundant pipelines when new commits are pushed
workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $GITLAB_CI == "false"                         # Run locally with gitlab-ci-local
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"  # Run on MRs
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/          # Run on version tags
    - if: $CI_COMMIT_BRANCH == "main"                   # Run on main branch only

stages:
  - test
  - build
  - deploy
  - release

# ===== TEST STAGE =====
# Runs on ALL branches and MRs for fast feedback
# No artifacts created - just validation

test:hub:
  stage: test
  image: node:${NODE_VERSION}
  interruptible: true

  # Cache npm packages to speed up subsequent runs
  cache:
    key:
      files:
        - rgfx-hub/package-lock.json
    paths:
      - rgfx-hub/.npm/

  before_script:
    # Workaround: Regenerate package-lock.json in CI with npm 10.8.2
    # Local dev uses npm 11.5.2 which creates incompatible lock file metadata
    - cd rgfx-hub
    - node --version
    - npm --version
    - rm -f package-lock.json
    - npm install --package-lock-only
    - npm ci --cache .npm --prefer-offline --ignore-scripts
    # Rebuild platform-specific binaries (phantomjs has no arm64 binary, so we skip all scripts)
    - npm rebuild esbuild electron rollup

  script:
    # Run all checks - ANY failure stops pipeline
    - npm run typecheck  # TypeScript errors = FAIL
    - npm run lint       # ESLint errors AND warnings = FAIL
    - npm test           # Any test failure = FAIL

  rules:
    - if: $GITLAB_CI == "false"                       # Run locally with gitlab-ci-local
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test:driver:
  stage: test
  image: python:3.11
  interruptible: true

  # Cache PlatformIO packages and pip installs to speed up subsequent runs
  cache:
    key:
      files:
        - esp32/platformio.ini
    paths:
      - esp32/.pio/

  before_script:
    - apt-get update && apt-get install -y nodejs npm
    - pip install platformio

  script:
    # Inject version (required for compilation)
    - node scripts/inject-version-driver.js

    # Generate HTML headers
    - python3 esp32/html_to_progmem.py
    - test -f esp32/src/generated/html_status.h

    # Build firmware - compile errors = FAIL
    - pio run --project-dir esp32

    # Run native tests (hardware-independent)
    # PIE flags fix ASAN+ASLR conflict in Docker/CI (LLVM bug #164989)
    # Disable LeakSanitizer - it has issues with Docker/ptrace and causes spurious SIGHUP
    - export CFLAGS="-fno-pie" CXXFLAGS="-fno-pie" LDFLAGS="-no-pie"
    - export ASAN_OPTIONS="detect_leaks=0"
    - pio test -e native --project-dir esp32

    # Note: Native tests run in CI. Embedded tests require hardware and must be run locally.

  rules:
    - if: $GITLAB_CI == "false"                       # Run locally with gitlab-ci-local
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ===== BUILD STAGE =====
# Runs on main branch and tags only
# Creates artifacts for releases

build:hub:
  stage: build
  image: node:${NODE_VERSION}
  interruptible: true
  allow_failure: true  # DMG build fails on Linux - don't block pages deploy

  # Cache npm packages to speed up subsequent runs
  cache:
    key:
      files:
        - rgfx-hub/package-lock.json
    paths:
      - rgfx-hub/.npm/

  before_script:
    # Workaround: Regenerate package-lock.json in CI with npm 10.8.2
    # Local dev uses npm 11.5.2 which creates incompatible lock file metadata
    - cd rgfx-hub
    - node --version
    - npm --version
    - rm -f package-lock.json
    - npm install --package-lock-only
    - npm ci --cache .npm --prefer-offline --ignore-scripts
    # Rebuild platform-specific binaries (phantomjs has no arm64 binary, so we skip all scripts)
    - npm rebuild esbuild electron rollup

  script:
    # Inject version from git tag
    - cd .. && node scripts/inject-version-hub.js && cd rgfx-hub

    # Run all checks - ANY failure stops build
    - npm run typecheck  # TypeScript errors = FAIL
    - npm run lint       # ESLint errors AND warnings = FAIL
    - npm test           # Any test failure = FAIL

    # Build DMG artifacts only for tags (releases), not for main branch commits
    # Main branch: Tests pass, no artifacts created (Linux CI can't build macOS DMG)
    # Tags: Tests pass + DMG created (requires macOS runner - not yet configured)
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Tag detected: Building DMG artifact..."
        npm run make
      else
        echo "Branch commit: Skipping DMG build (tests passed, no artifacts needed)"
      fi

  artifacts:
    name: "rgfx-hub-${CI_COMMIT_REF_SLUG}"
    paths:
      - rgfx-hub/out/make/**/*.dmg
    expire_in: 1 month

  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ===== DRIVER BUILD (ESP32) =====
build:driver:
  stage: build
  image: python:3.11
  interruptible: true

  # Cache PlatformIO packages
  cache:
    key:
      files:
        - esp32/platformio.ini
    paths:
      - esp32/.pio/

  before_script:
    # Install Node.js for version injection script
    - apt-get update && apt-get install -y nodejs npm

    # Install PlatformIO
    - pip install platformio

  script:
    # Inject version from git tag
    - node scripts/inject-version-driver.js

    # Generate HTML headers (pre-build script)
    - echo "Running html_to_progmem.py..."
    - python3 esp32/html_to_progmem.py
    - echo "Verifying generated files..."
    - ls -laR esp32/src/generated/
    - test -f esp32/src/generated/html_status.h

    # Build firmware - compile errors = FAIL
    - pio run --project-dir esp32

    # Note: Native tests run in test stage. Embedded tests require hardware.
    # Run locally before release: pio test --project-dir esp32

    # Copy firmware to installer directory (uses Python script - PlatformIO requirement)
    - python3 esp32/copy_firmware.py

  artifacts:
    name: "rgfx-driver-${CI_COMMIT_REF_SLUG}"
    paths:
      - esp32-installer/*.bin
      - esp32-installer/manifest.json
      - esp32-installer/index.html
    expire_in: 1 month

  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ===== DEPLOY TO GITLAB PAGES =====
pages:
  stage: deploy
  dependencies:
    - build:driver

  script:
    # Assemble public directory
    - mkdir -p public/docs
    - cp -r esp32-installer/* public/
    - cp -r public-docs/site/* public/docs/

  artifacts:
    paths:
      - public

  environment:
    name: production
    url: https://rgfx.io

  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ===== CREATE RELEASE (MANUAL TRIGGER) =====
# This job waits for manual approval before creating the release
# Click the "Play" button in GitLab UI to approve and create release
create:release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  dependencies:
    - build:hub
    - build:driver

  script:
    # Generate release notes from commits since last tag
    - |
      PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${CI_COMMIT_TAG}^ 2>/dev/null || echo "")
      if [ -n "$PREVIOUS_TAG" ]; then
        echo "Generating release notes from ${PREVIOUS_TAG} to ${CI_COMMIT_TAG}"
        NOTES=$(git log ${PREVIOUS_TAG}..${CI_COMMIT_TAG} --pretty=format:"- %s" --reverse)
      else
        echo "First release - no previous tag found"
        NOTES="First release"
      fi

      echo "Release notes:"
      echo "$NOTES"

    # Create release with artifacts using glab CLI
    - |
      glab release create "${CI_COMMIT_TAG}" \
        --name "RGFX ${CI_COMMIT_TAG}" \
        --notes "${NOTES}" \
        rgfx-hub/out/make/**/*.dmg \
        esp32-installer/*.bin

  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual  # *** MANUAL TRIGGER - YOU APPROVE RELEASE ***

  allow_failure: false
