# StyLua Configuration
# Formatter for RGFX MAME Lua scripts

# Lua version (MAME uses Lua 5.4)
column_width = 100
line_endings = "Unix"
indent_type = "Tabs"
indent_width = 1
quote_style = "AutoPreferDouble"
call_parentheses = "Always"

# Collapse simple statements onto one line
collapse_simple_statement = "Never"
