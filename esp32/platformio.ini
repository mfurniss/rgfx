; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = rgfx-driver, rgfx-driver-s3
build_cache_dir = .cache       ; Enable build cache (50-80% faster rebuilds)

; ============================================================================
; Common build flags shared across environments
; ============================================================================
[common]
build_flags =
    ; Optimization
    -Os                          ; Optimize for size
    -DCORE_DEBUG_LEVEL=3         ; Info level logging

    ; Compiler warnings
    -Wall                        ; Enable most warnings
    -Wextra                      ; Extra warnings
    -Wunused-parameter           ; Warn about unused function parameters

    ; FastLED optimizations
    -DFASTLED_ALLOW_INTERRUPTS=1 ; Required for ESP32 platforms

[env:rgfx-driver]
platform = espressif32@6.12.0  ; Pin exact version for CI/CD reliability
board = esp32dev
framework = arduino
board_build.partitions = partitions_ota.csv  ; Dual 1.5MB OTA partitions for OTA support

; Source filter - exclude native and test HAL implementations
build_src_filter =
    +<*>
    -<hal/native/>
    -<hal/test/>

; Build flags
build_flags =
    ${common.build_flags}
    -I src              ; Add src/ to include path for clean includes
    -I test             ; Test helpers (for IntelliSense in test files)
    ; lwIP UDP receive mailbox size (default 6 is too small for high throughput)
    ; Prevents silent packet drops at the network stack level
    -DCONFIG_LWIP_UDP_RECVMBOX_SIZE=32

; Serial Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize, time, send_on_enter
monitor_rts = 0
monitor_dtr = 0
monitor_echo = yes

; Upload settings
upload_speed = 921600

; Libraries (add as needed for your project)
lib_deps =
    fastled/FastLED@^3.9.0
    256dpi/MQTT@^2.5.2
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/prampec/IotWebConf.git#v3.2.2

; Static code analysis
check_tool = clangtidy
check_flags =
    clangtidy: --config-file=.clang-tidy
check_skip_packages = yes

; Build scripts
extra_scripts =
    pre:inject_version.py
    ; pre:html_to_progmem.py  ; Disabled - run manually in CI and via npm run generate:html locally
    post:copy_firmware.py

; CH340 USB-to-Serial Chip Environment
; Usage: pio run -e rgfx-driver-ch340 -t upload
[env:rgfx-driver-ch340]
extends = env:rgfx-driver
upload_port = /dev/cu.usbserial-1140
upload_speed = 460800
monitor_port = /dev/cu.usbserial-1140
; Inherits build_src_filter from rgfx-driver

; ESP32-S3 SuperMini Environment (low power alternative to ESP32-WROOM dev boards)
; Usage: pio run -e rgfx-driver-s3
[env:rgfx-driver-s3]
extends = env:rgfx-driver
board = lolin_s3_mini
board_build.partitions = partitions_ota.csv
upload_speed = 921600
monitor_speed = 115200
; ESP32-S3 native USB CDC requires these flags for Serial to work
build_flags =
    ${env:rgfx-driver.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; I2C Scanner Tool Environment
; Usage: pio run -e i2c-scanner -t upload && pio device monitor
[env:i2c-scanner]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
monitor_rts = 0
monitor_dtr = 0
upload_speed = 921600
build_src_filter = +<../tools/i2c_scanner.cpp>

; Native Unit Testing Environment
; Usage: pio test -e native
; Runs tests on the host machine for fast iteration
[env:native]
platform = native
build_flags =
    -std=c++17          ; Modern C++ standard (was c++11)
    -DUNIT_TEST         ; Define for conditional compilation (enables mocks)
    -DUNITY_INCLUDE_DOUBLE  ; Enable double precision assertions in Unity
    -I src              ; Add src/ to include path for clean includes
    -I src/graphics     ; Graphics module (canvas, coordinate_transforms, etc.)
    -I src/effects      ; Effects module (pulse, wipe, etc.)
    -I src/utils        ; Utility functions
    -I test             ; Test helpers (pixel_digest.h, effect_test_helpers.h, etc.)
    -Wall
    -Wextra
    -fsanitize=address  ; Detect buffer overflows, use-after-free, memory leaks
    -fno-omit-frame-pointer  ; Better stack traces with AddressSanitizer
    -g                  ; Debug symbols for meaningful error reports
test_framework = unity
test_build_src = no     ; Don't auto-include src/ - tests are self-contained
lib_deps =
    bblanchon/ArduinoJson@^7.0.0  ; JSON library works on native platform

; Native environment for generating digest hashes
; Usage: pio test -e native-generate-digests
; Prints digest values for updating snapshot tests after rendering changes
[env:native-generate-digests]
extends = env:native
build_flags =
    ${env:native.build_flags}
    -DGENERATE_DIGESTS  ; Print digest hashes instead of asserting
    -DUNITY_INCLUDE_DOUBLE  ; Enable double precision assertions

; Native environment for code coverage (LLVM instrumentation)
; Usage: pio test -e native-coverage
; Uses Clang's -fprofile-instr-generate for coverage on macOS
; Note: ASan removed to avoid conflicts with coverage instrumentation
[env:native-coverage]
platform = native
build_flags =
    -std=c++17
    -DUNIT_TEST
    -DUNITY_INCLUDE_DOUBLE  ; Enable double precision assertions in Unity
    -I src
    -I src/graphics
    -I src/effects
    -I src/utils
    -I test
    -Wall
    -Wextra
    -g
    -fprofile-instr-generate
    -fcoverage-mapping
extra_scripts =
    pre:scripts/coverage_link.py
test_framework = unity
test_build_src = no
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
