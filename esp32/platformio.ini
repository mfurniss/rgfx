; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = rgfx-driver

[env:rgfx-driver]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize, send_on_enter
monitor_rts = 0
monitor_dtr = 0
monitor_echo = yes

; Upload settings
upload_speed = 921600

; Libraries (add as needed for your project)
lib_deps =
    fastled/FastLED@^3.6.0
    256dpi/MQTT@^2.5.2
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/prampec/IotWebConf.git#v3.2.2
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit GFX Library@^1.11.10
    adafruit/Adafruit BusIO@^1.16.1

; Static code analysis
check_tool = clangtidy
check_flags =
    clangtidy: --config-file=.clang-tidy
check_skip_packages = yes

; Build scripts
extra_scripts =
    pre:inject_version.py
    pre:html_to_progmem.py
    post:copy_firmware.py

; I2C Scanner Tool Environment
; Usage: pio run -e i2c-scanner -t upload && pio device monitor
[env:i2c-scanner]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
monitor_rts = 0
monitor_dtr = 0
upload_speed = 921600
build_src_filter = +<../tools/i2c_scanner.cpp>

; OTA Upload environments
; Usage: pio run -e rgfx-driver-ota -t upload --upload-port <device-ip-or-hostname>
; Example: pio run -e rgfx-driver-ota -t upload --upload-port rgfx-driver.local
; For multiple devices, create additional environments with different upload_port values
[env:rgfx-driver-ota]
extends = env:rgfx-driver
upload_protocol = espota
upload_flags =

; Native Unit Testing Environment
; Usage: pio test -e native
; Runs tests on the host machine for fast iteration
[env:native]
platform = native
build_flags =
    -std=c++11
    -DUNIT_TEST
test_framework = unity
