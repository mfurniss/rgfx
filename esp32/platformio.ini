; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = rgfx-driver

[env:rgfx-driver]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize, send_on_enter
monitor_rts = 0
monitor_dtr = 0
monitor_echo = yes
monitor_port = /dev/tty.usbserial-0001

; Upload settings
upload_speed = 921600
upload_port = /dev/cu.usbserial-0001
upload_flags =
    --before=default_reset
    --after=hard_reset

; Libraries (add as needed for your project)
lib_deps =
    fastled/FastLED@^3.6.0
    256dpi/MQTT@^2.5.2
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/prampec/IotWebConf.git#v3.2.2

; Post-build script to copy firmware to installer folder
extra_scripts = post:copy_firmware.py

; OTA Upload environments
; Usage: pio run -e rgfx-driver-ota -t upload
; Or dynamically: pio run -t upload --upload-port <device-ip>
; For multiple devices, create additional environments with different upload_port values
[env:rgfx-driver-ota]
extends = env:rgfx-driver
upload_protocol = espota
upload_port = 192.168.10.86  ; Can also use mDNS like rgfx-driver.local
upload_flags =  ; Clear serial upload flags inherited from base environment
